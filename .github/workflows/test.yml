name: Tests
on: pull_request

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project DockDoor.xcodeproj -scheme DockDoor
      - name: Run tests
        run: xcodebuild test -project DockDoor.xcodeproj -scheme DockDoor -destination 'platform=macOS'
